name: FitTrack
options:
  bundleIdPrefix: com.abhaygulati
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.7.2"
    CURRENT_PROJECT_VERSION: "14"
    DEVELOPMENT_TEAM: "TX8F2Q75FL"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  FitTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme: {}
    sources:
      - path: FitTrack
        excludes:
          - "**/.DS_Store"
    resources:
      - path: FitTrack/Assets.xcassets
      - path: FitTrack/Preview Content
      - path: FitTrack/Resources
    dependencies:
      - target: FitTrackWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhaygulati.fittrack.ag2026
        INFOPLIST_FILE: FitTrack/Info.plist
        CODE_SIGN_ENTITLEMENTS: FitTrack/FitTrack.entitlements
        DEVELOPMENT_ASSET_PATHS: '"FitTrack/Preview Content"'
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  FitTrackWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FitTrackWidgets
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
      # Shared with the app target so both can see the ActivityAttributes
      # struct. Listed explicitly (instead of group-include) because the
      # widget target needs only this one file from FitTrack/.
      - path: FitTrack/Models/WorkoutActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhaygulati.fittrack.ag2026.widgets
        INFOPLIST_FILE: FitTrackWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "TX8F2Q75FL"
